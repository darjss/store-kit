name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: '24'
      - run: vp install --frozen-lockfile
      - run: vp run @store-kit/plugged#generate-types
      - run: vp check
      - run: vp test
      - run: vp run -r build
