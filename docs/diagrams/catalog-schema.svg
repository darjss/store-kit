ust="spacing" textLength="235.6903" x="326" y="458.61">store-specific facts, not a filter engine.</text></g><g class="entity" data-qualified-name="GMN17" data-source-line="105" id="ent0018"><path d="M754,470.8499 L754,530.575 A0,0 0 0 0 754,530.575 L1057.5552,530.575 A0,0 0 0 0 1057.5552,530.575 L1057.5552,480.8499 L1047.5552,470.8499 L910,470.8499 L906,452.3568 L902,470.8499 L754,470.8499 A0,0 0 0 0 754,470.8499" fill="#FEF3C7" style="stroke:#D97706;stroke-width:0.5;"/><path d="M1047.5552,470.8499 L1047.5552,480.8499 L1057.5552,480.8499 L1047.5552,470.8499" fill="#FEF3C7" style="stroke:#D97706;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="234.2082" x="760" y="488.4599">Every product has at least one variant.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="268.5543" x="760" y="505.0349">A product without choices uses options = {}.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="282.5552" x="760" y="521.61">No reservations, warehouses, or option tables.</text></g><g class="entity" data-qualified-name="GMN20" data-source-line="111" id="ent0021"><path d="M1095,91.8499 L1095,117.8499 L988.1677,121.8499 L1095,125.8499 L1095,151.575 A0,0 0 0 0 1095,151.575 L1405.6273,151.575 A0,0 0 0 0 1405.6273,151.575 L1405.6273,101.8499 L1395.6273,91.8499 L1095,91.8499 A0,0 0 0 0 1095,91.8499" fill="#FEF3C7" style="stroke:#D97706;stroke-width:0.5;"/><path d="M1395.6273,91.8499 L1395.6273,101.8499 L1405.6273,101.8499 L1395.6273,91.8499" fill="#FEF3C7" style="stroke:#D97706;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="240.6302" x="1101" y="109.4599">Lowest sort_order is the primary image.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="283.4132" x="1101" y="126.0349">Store R2 keys, not environment-specific URLs.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="289.6273" x="1101" y="142.61">Unlinked images are the shared product gallery.</text></g><g class="entity" data-qualified-name="GMN23" data-source-line="117" id="ent0024"><path d="M1098.5,303.8499 L1098.5,363.575 A0,0 0 0 0 1098.5,363.575 L1402.3413,363.575 A0,0 0 0 0 1402.3413,363.575 L1402.3413,313.8499 L1392.3413,303.8499 L1254.5,303.8499 L1250.5,286.1888 L1246.5,303.8499 L1098.5,303.8499 A0,0 0 0 0 1098.5,303.8499" fill="#FEF3C7" style="stroke:#D97706;stroke-width:0.5;"/><path d="M1392.3413,303.8499 L1392.3413,313.8499 L1402.3413,313.8499 L1392.3413,303.8499" fill="#FEF3C7" style="stroke:#D97706;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="252.0833" x="1104.5" y="321.4599">A linked image can serve several variants.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="239.0963" x="1104.5" y="338.0349">Example: Red / S, Red / M, and Red / L.</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="282.8413" x="1104.5" y="354.61">Fall back to shared images when no links exist.</text></g><g class="link" data-entity-1="ent0002" data-entity-2="ent0004" data-link-type="crowfoot" id="lnk8"><line style="stroke:#525252;stroke-width:1;" x1="183.7358" x2="173.0819" y1="200.81" y2="198.0721"/><ellipse cx="183.7358" cy="200.81" fill="none" rx="4" ry="4" style="stroke:#525252;stroke-width:1;"/><line style="stroke:#525252;stroke-width:1;" x1="175.9605" x2="177.9516" y1="202.9418" y2="195.1936"/><line style="stroke:#525252;stroke-width:1;" x1="335.4469" x2="344.6886" y1="239.7972" y2="235.9772"/><line style="stroke:#525252;stroke-width:1;" x1="335.4469" x2="341.7018" y1="239.7972" y2="247.5995"/><line style="stroke:#525252;stroke-width:1;" x1="335.4469" x2="343.1952" y1="239.7972" y2="241.7883"/