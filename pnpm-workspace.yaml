packages:
  - apps/*
  - packages/*

# Pre-approve build scripts for the packages C3 itself installs that need
# them: `workerd` downloads the platform binary, `esbuild` and `sharp`
# (via miniflare) download/build native bindings. Without these, pnpm 11+
# aborts the install with ERR_PNPM_IGNORED_BUILDS.
allowBuilds:
  esbuild: true
  workerd: true
  sharp: true
minimumReleaseAgeExclude:
  - miniflare@4.20260721.0
  - wrangler@4.113.0
catalog:
  '@tanstack/solid-query': ^5.101.3
  better-result: ^2.10.0
  solid-js: ^1.9.14
  tailwindcss: ^4.3.3
  valibot: ^1.4.2
  vite: npm:@voidzero-dev/vite-plus-core@^0.2.5
  vite-plus: ^0.2.5
overrides:
  vite: 'catalog:'
peerDependencyRules:
  allowAny:
    - vite
  allowedVersions:
    vite: '*'
